name: Generate non-CN IP list from upstream

on:
  schedule:
    # GitHub Actions cannot subscribe to another repository's push events.
    # Poll shortly after chnroutes2's hourly update and commit only when output changes.
    - cron: "15 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Generate lists from chnroutes2
        run: python scripts/generate_uncnip.py

      - name: Commit updated lists
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add dist/*.txt dist/source.json
          if git diff --cached --quiet; then
            echo "No upstream changes to commit."
          else
            git commit -m "chore: update non-CN IP list from chnroutes2"
            git push
          fi
